<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #04050f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgba(235, 240, 255, 0.92);
    }

    canvas { display: block; }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(10, 14, 32, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      user-select: none;
      pointer-events: none;
      min-width: 200px;
      animation: hud-in 0.7s cubic-bezier(0.22, 1.2, 0.36, 1) 0.15s backwards;
    }

    @keyframes hud-in {
      from { opacity: 0; transform: translateY(-14px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    #hud h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    #hud-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px currentColor;
      flex: none;
      animation: swatch-pulse 2.4s ease-in-out infinite;
    }

    @keyframes swatch-pulse {
      0%, 100% { box-shadow: 0 0 6px currentColor; transform: scale(1); }
      50%      { box-shadow: 0 0 14px currentColor; transform: scale(1.25); }
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      font-size: 12px;
      line-height: 1.8;
    }

    .hud-row .label { opacity: 0.55; }
    .hud-row .value { font-variant-numeric: tabular-nums; font-weight: 500; }

    #hud-params {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 11px;
      opacity: 0.5;
    }

    #hud-hint {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.5;
      color: #9db4ff;
      opacity: 0.9;
      max-width: 220px;
      transition: opacity 0.4s ease;
    }

    #hud-hint.hidden { display: none; }

    #error {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      padding: 24px;
      font-size: 14px;
      line-height: 1.6;
      color: #ffb4b4;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h1><span id="hud-swatch"></span>Particle Sim</h1>
    <div class="hud-row"><span class="label">Windows linked</span><span class="value" id="hud-windows">1</span></div>
    <div class="hud-row"><span class="label">Particles</span><span class="value" id="hud-particles">–</span></div>
    <div class="hud-row"><span class="label">FPS</span><span class="value" id="hud-fps">–</span></div>
    <div id="hud-params"></div>
    <div id="hud-hint">Open this page in another browser window and move it around — the windows will find each other.</div>
  </div>

  <div id="error"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.142.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.142.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import init from './main.js';

    init().catch((err) => {
      console.error(err);
      const el = document.getElementById('error');
      el.style.display = 'grid';
      el.textContent = `Failed to start: ${err.message}. Serve this folder over HTTP (e.g. python3 -m http.server) — module imports and shader fetches don't work from file://.`;
    });
  </script>
</body>
</html>
